name: lint

on:
  push:
    branches:
      - main
    paths:
      - "Aegis/**/*.lua"
      - ".luacheckrc"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "Aegis/**/*.lua"
      - ".luacheckrc"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck Aegis/ --no-color -q
